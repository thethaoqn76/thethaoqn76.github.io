<!DOCTYPE html>
<html>
<head>
    <title>Zoom Mini</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>Zoom Mini</h1>

    <input type="text" id="username" placeholder="Nhập tên của bạn">
    <input type="text" id="room" placeholder="Nhập tên phòng">

    <button onclick="createRoom()">Tạo phòng</button>
<button onclick="joinRoom()">Tham gia phòng</button>

<script>
function createRoom(){
    const name = document.querySelector("input[placeholder='Nhập tên của bạn']").value;
    const room = document.querySelector("input[placeholder='Nhập tên phòng']").value;

    if(name && room){
        window.location.href = "meeting.html?name=" + name + "&room=" + room;
    } else {
        alert("Vui lòng nhập đầy đủ thông tin");
    }
}

function joinRoom(){
    createRoom();
}
</script>
</div>

<script>
function createRoom(){
    let name = document.getElementById("username").value;
    let room = document.getElementById("room").value;

    if(name=="" || room==""){
        alert("Nhập đầy đủ thông tin");
        return;
    }

    localStorage.setItem("username", name);
    localStorage.setItem("isHost", "true");

    window.location.href = "meeting.html?room=" + room;
}

function joinRoom(){
    let name = document.getElementById("username").value;
    let room = document.getElementById("room").value;

    if(name=="" || room==""){
        alert("Nhập đầy đủ thông tin");
        return;
    }

    localStorage.setItem("username", name);
    localStorage.setItem("isHost", "false");

    window.location.href = "meeting.html?room=" + room;
}
</script>

</body>

</html>
