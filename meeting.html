<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Zoom Mini - Phòng họp</title>
    <script src="https://meet.jit.si/external_api.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<div id="meet" style="width:100%; height:100vh;"></div>

<script>
const domain = "meet.jit.si";

let room = new URLSearchParams(window.location.search).get("room");

if (!room) {
    room = Math.random().toString(36).substring(2, 8);
    window.history.replaceState({}, '', '?room=' + room);
}

const options = {
    roomName: room,
    parentNode: document.querySelector("#meet"),
    width: "100%",
    height: "100%",
    lang: "vi",
    configOverwrite: {
        prejoinPageEnabled: false,
        disableDeepLinking: true,
        enableWelcomePage: false
    }
};

const api = new JitsiMeetExternalAPI(domain, options);
</script>
<!-- Header Logo -->
<div id="appLogo">
    <div class="logo-circle">
        <svg viewBox="0 0 24 24" fill="white">
            <path d="M17 10.5V7c0-1.1-.9-2-2-2H5C3.9 5 3 5.9 3 7v10c0 
            1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-3.5l4 
            4v-11l-4 4z"/>
        </svg>
    </div>
    <div class="logo-content">
        <div class="logo-name">Zoom Mini</div>
        <div class="logo-tag">Thể Thao QN</div>
    </div>
</div>

<style>
#appLogo {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    background: rgba(20, 30, 45, 0.75);
    backdrop-filter: blur(12px);
    border-radius: 60px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    transition: 0.3s ease;
}

#appLogo:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.logo-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    display: flex;
    align-items: center;
    justify-content: center;
}

.logo-circle svg {
    width: 20px;
    height: 20px;
}

.logo-name {
    font-size: 15px;
    font-weight: 600;
}

.logo-tag {
    font-size: 11px;
    opacity: 0.7;
}
</style>

</body>
</html>
