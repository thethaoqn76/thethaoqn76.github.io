<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Zoom Mini - Phòng họp</title>

<script src="https://meet.jit.si/external_api.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}

/* Logo */
#appLogo{
position:fixed;
top:18px;
left:18px;
z-index:9999;
display:flex;
align-items:center;
gap:12px;
padding:10px 18px;
background:rgba(20,30,45,0.75);
backdrop-filter:blur(12px);
border-radius:60px;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
font-family:'Segoe UI',sans-serif;
color:white;
}

.logo-circle{
width:40px;
height:40px;
border-radius:50%;
background:linear-gradient(135deg,#2563eb,#3b82f6);
display:flex;
align-items:center;
justify-content:center;
}

.logo-circle svg{
width:20px;
height:20px;
}

.logo-name{
font-size:15px;
font-weight:600;
}

.logo-tag{
font-size:11px;
opacity:0.7;
}

/* Nút copy link */

#copyLink{
position:fixed;
top:18px;
right:20px;
z-index:9999;
padding:10px 18px;
border:none;
border-radius:20px;
background:#2563eb;
color:white;
cursor:pointer;
font-weight:500;
}
</style>

</head>

<body>

<div id="meet" style="width:100%;height:100vh;"></div>

<script>

const domain = "meet.jit.si";

const params = new URLSearchParams(window.location.search);

let room = params.get("room");

/* FIX lỗi phòng có dấu */
if(room){
room = room
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-zA-Z0-9]/g,"")
.toLowerCase();
}

/* nếu không có phòng */
if(!room){
room = "zoommini"+Math.floor(Math.random()*10000);
window.history.replaceState({},'',"?room="+room);
}

const userName = localStorage.getItem("username") || "Khách";

/* Delay khởi tạo để tránh lỗi trắng màn hình */

setTimeout(()=>{

const options = {

roomName: room,

parentNode: document.querySelector("#meet"),

width:"100%",

height:"100%",

lang:"vi",

userInfo:{
displayName:userName
},

configOverwrite:{

prejoinPageEnabled:false,

disableDeepLinking:true,

enableWelcomePage:false,

startWithAudioMuted:true,
startWithVideoMuted:false,

channelLastN:6,
disableSimulcast:false,
enableLayerSuspension:true

},

interfaceConfigOverwrite:{

SHOW_JITSI_WATERMARK:false,
SHOW_BRAND_WATERMARK:false,
SHOW_POWERED_BY:false,
SHOW_WATERMARK_FOR_GUESTS:false,
MOBILE_APP_PROMO:false

}

};

window.api = new JitsiMeetExternalAPI(domain,options);

/* Nếu bị disconnect → tự reconnect */

api.addEventListener("videoConferenceLeft",()=>{

setTimeout(()=>{
location.reload();
},2000);

});

},800);

</script>

<!-- Logo -->

<div id="appLogo">

<div class="logo-circle">
<svg viewBox="0 0 24 24" fill="white">
<path d="M17 10.5V7c0-1.1-.9-2-2-2H5C3.9 5 3 5.9 3 7v10c0 
1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-3.5l4 
4v-11l-4 4z"/>
</svg>
</div>

<div class="logo-content">
<div class="logo-name">Zoom Mini</div>
<div class="logo-tag">Thể Thao QN</div>
</div>

</div>

<button id="copyLink">Copy link phòng</button>

<script>

document.getElementById("copyLink").onclick=function(){

const link=window.location.href;

navigator.clipboard.writeText(link);

alert("Đã copy link phòng!");

}

</script>

</body>
</html>
